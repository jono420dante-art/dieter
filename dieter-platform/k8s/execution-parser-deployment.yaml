apiVersion: apps/v1
kind: Deployment
metadata:
  name: dieter-execution-parser
  namespace: dieter
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dieter-execution-parser
  template:
    metadata:
      labels:
        app: dieter-execution-parser
    spec:
      containers:
      - name: parser
        image: yourusername/dieter-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: SANDBOX_PROXY_URL
          value: http://dieter-sandbox:5000
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: dieter-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: dieter-secrets
              key: REDIS_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dieter-execution-parser
  namespace: dieter
spec:
  selector:
    app: dieter-execution-parser
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dieter-execution-parser
  namespace: dieter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dieter-execution-parser
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
