version: '3.9'

services:
  # ========================================================================
  # POSTGRES DATABASE
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: dieter-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-dieter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dieter}
      POSTGRES_DB: ${DB_NAME:-dieter}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dieter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dieter-net
    restart: unless-stopped

  # ========================================================================
  # REDIS CACHE & QUEUE (with authentication)
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: dieter-redis
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-redis-dev-password-change-in-production}
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis-dev-password-change-in-production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dieter-net
    restart: unless-stopped

  # ========================================================================
  # OLLAMA (Local LLM - Optional, for development/free tier)
  # ========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: dieter-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - dieter-net
    restart: unless-stopped
    profiles:
      - ollama

  # ========================================================================
  # FASTAPI BACKEND
  # ========================================================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: dieter-api
    command: >
      sh -c "python -m uvicorn app.main:app 
      --host 0.0.0.0 
      --port ${API_PORT:-8000}
      $( [ '${ENVIRONMENT:-development}' = 'development' ] && echo '--reload' || echo '' )"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-dieter}:${DB_PASSWORD:-dieter}@postgres:5432/${DB_NAME:-dieter}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-dev-password-change-in-production}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis-dev-password-change-in-production}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis-dev-password-change-in-production}@redis:6379/2
      JWT_SECRET: ${JWT_SECRET:?error: JWT_SECRET not set - generate strong secret for production}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-ops@dieter.internal}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@dieter.internal}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-DIETER}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      ALLOW_ORIGINS_ANY: ${ALLOW_ORIGINS_ANY:-false}
      OLLAMA_BASE_URL: http://ollama:11434
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dieter-net
    restart: unless-stopped

  # ========================================================================
  # PUBLIC WEB (Next.js - Lead capture, public feedback)
  # ========================================================================
  public-web:
    build:
      context: ./apps/public-web
      dockerfile: Dockerfile
    container_name: dieter-public-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PRIVATE_API_URL: http://api:8000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/public-web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - dieter-net
    restart: unless-stopped

  # ========================================================================
  # OPERATOR WEB (Next.js - Dashboard, internal operations)
  # ========================================================================
  operator-web:
    build:
      context: ./apps/operator-web
      dockerfile: Dockerfile
    container_name: dieter-operator-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PRIVATE_API_URL: http://api:8000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3001:3000"
    volumes:
      - ./apps/operator-web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - dieter-net
    restart: unless-stopped

  # ========================================================================
  # WORKER (Celery/Redis - Background jobs, email scheduling)
  # ========================================================================
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: dieter-worker
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://${DB_USER:-dieter}:${DB_PASSWORD:-dieter}@postgres:5432/${DB_NAME:-dieter}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-dev-password-change-in-production}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis-dev-password-change-in-production}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis-dev-password-change-in-production}@redis:6379/2
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-ops@dieter.internal}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./apps/worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - dieter-net
    restart: unless-stopped

  # ========================================================================
  # PROMETHEUS (Metrics collection)
  # ========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: dieter-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - dieter-net
    restart: unless-stopped
    profiles:
      - monitoring

  # ========================================================================
  # GRAFANA (Dashboards) - SECURED
  # ========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: dieter-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?error: GRAFANA_PASSWORD not set}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - dieter-net
    restart: unless-stopped
    profiles:
      - monitoring

  # ========================================================================
  # PGADMIN (Database UI - Optional) - SECURED
  # ========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dieter-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?error: PGADMIN_EMAIL not set}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?error: PGADMIN_PASSWORD not set}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dieter-net
    restart: unless-stopped
    profiles:
      - dev-tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dieter-net:
    driver: bridge
